<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sugari Houses Map</title>

  <!-- LeafletのCSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
    }

    /* 凡例のデザイン */
    .legend {
      background: white;
      padding: 10px 12px;
      line-height: 22px;
      color: #333;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 13px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .legend-color {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 6px;
      border: 1px solid #555;
      vertical-align: middle;
    }

    /* ポップアップの見た目 */
    .popup-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-table {
      border-collapse: collapse;
      font-size: 13px;
    }

    .popup-table th {
      text-align: left;
      padding: 3px 8px 3px 0;
      white-space: nowrap;
      color: #333;
    }

    .popup-table td {
      padding: 3px 0;
      color: #111;
    }
/* ポップアップ全体の幅を調整 */
    .leaflet-popup-content {
      width: 280px !important;
      max-width: 280px !important;
    }

    /* ポップアップ内の画像サイズ */
    .popup-image {
      width: 100% !important;
      max-width: 260px !important;
      max-height: 180px !important;
      object-fit: contain;
      border-radius: 6px;
      margin-top: 8px;
      border: 1px solid #ccc;
      display: block;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Leaflet本体 -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // ==============================
    // 地図の初期表示
    // ==============================
    const map = L.map('map').setView([34.086, 136.232], 16);

    // ==============================
    // 背景地図：OpenStreetMap
    // ==============================
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // ==============================
    // GeoJSON内の「状態」列名
    // ==============================
    const STATUS_FIELD = 'sukari_house_status_状態';

    // ==============================
    // 状態ごとの色
    // QGISの色分けに近い色を指定
    // ==============================
    const statusColors = {
      '現在居住': '#FFD700',
      '完全空き家': '#FFFF00',
      '空き家で施設入居及び年に数回居住': '#ADFF2F',
      '倉庫': '#00FF00',
      '飲食店': '#FF00FF',
      '商店': '#A020F0',
      '加工場': '#00FFFF',
      '行政関係': '#4169E1',
      '現在居住(別荘)': '#D2B48C',
      '神社・お寺': '#9370DB',
      '撤去済み': '#FFFFFF',
      '管理不完全空き家': '#808080',
      '特定空き家': '#000000',
      '不明': '#DDDDDD'
    };

    // 状態名から色を取得する関数
    function getColor(status) {
      const key = String(status || '').trim();
      return statusColors[key] || '#3388FF';
    }

    // nullやundefinedを空白にする
    function safeValue(value) {
      if (value === null || value === undefined || value === '') {
        return '';
      }
      return String(value);
    }

    // HTMLとして安全に表示するための処理
    function escapeHtml(value) {
      return safeValue(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // ==============================
    // ポップアップに表示する内容
    // ※個人情報は出さない設定
    // ==============================
// ==============================
// ポップアップに表示する内容
// ==============================
// ==============================
// ポップアップに表示する内容
// ==============================
function createPopupContent(properties) {
  const houseId = safeValue(properties['house_id']);

  // 1行追加するための関数
  // alwaysDisplay が true のものは、空欄でも常に表示
  function addRow(label, value, alwaysDisplay = false) {
    const displayValue = safeValue(value);

    if (!alwaysDisplay && displayValue === '') {
      return '';
    }

    return (
      '<tr>' +
        '<th>' + escapeHtml(label) + '</th>' +
        '<td>' + escapeHtml(displayValue) + '</td>' +
      '</tr>'
    );
  }

  // 複数候補の列名から、最初に値が入っているものを取得
  function getFirstValue(fieldNames) {
    for (const fieldName of fieldNames) {
      const value = safeValue(properties[fieldName]);
      if (value !== '') {
        return value;
      }
    }
    return '';
  }

  // GoogleドライブのURLを画像表示用URLに変換
  function convertGoogleDriveImageUrl(url) {
    const imageUrl = safeValue(url);

    if (imageUrl === '') {
      return '';
    }

    // Google Driveの共有URLの場合
    if (imageUrl.includes('drive.google.com')) {
      let fileId = '';

      // 形式1:
      // https://drive.google.com/file/d/FILE_ID/view
      const matchFile = imageUrl.match(/\/file\/d\/([^/]+)/);
      if (matchFile && matchFile[1]) {
        fileId = matchFile[1];
      }

      // 形式2:
      // https://drive.google.com/open?id=FILE_ID
      // https://drive.google.com/uc?id=FILE_ID
      const matchId = imageUrl.match(/[?&]id=([^&]+)/);
      if (!fileId && matchId && matchId[1]) {
        fileId = matchId[1];
      }

      // ファイルIDが取れたら、画像表示用URLに変換
      if (fileId) {
        return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w800';
      }
    }

    // GitHub内の画像パスや通常URLの場合はそのまま使う
    return imageUrl;
  }

  // image_path1 の取得
  // GeoJSON側では prefix が付いている可能性があるため複数候補を見ます
  const imagePath1 = getFirstValue([
    'sukari_house_status_image_path1',
    'image_path1'
  ]);

  const displayImageUrl = convertGoogleDriveImageUrl(imagePath1);

  let html = '';

  html += '<div class="popup-title">';
  html += '住宅情報';
  if (houseId) {
    html += '：' + escapeHtml(houseId);
  }
  html += '</div>';

  html += '<table class="popup-table">';

  // 常に表示する情報
  html += addRow('house_id', properties['house_id'], true);
  html += addRow('状態', properties[STATUS_FIELD], true);
  html += addRow('番地', properties['sukari_house_status_番地'], true);
  html += addRow('所有者氏名', properties['sukari_house_status_所有者　氏名'], true);
  html += addRow('所有者連絡先', properties['sukari_house_status_所有者　連絡先'], true);

  // 入居者名①〜④は、記入がある場合だけ表示
  html += addRow('入居者名①', properties['sukari_house_status_入居者名①']);
  html += addRow('入居者名②', properties['sukari_house_status_入居者名②']);
  html += addRow('入居者名③', properties['sukari_house_status_入居者名③']);
  html += addRow('入居者名④', properties['sukari_house_status_入居者名④']);

  // 補足情報
  html += addRow('所属地区', properties['sukari_house_status_所属する地区']);
  html += addRow('須賀利区への加入', properties['sukari_house_status_須賀利区への加入']);
  html += addRow('維持管理状況', properties['sukari_house_status_維持管理状況']);
  html += addRow('今後の建物維持管理について', properties['sukari_house_status_今後の建物維持管理について']);
  html += addRow('メモ', properties['sukari_house_status_メモ']);

  html += '</table>';

  // 画像がある場合だけ表示
  if (displayImageUrl !== '') {
    html += '<img class="popup-image" src="' + escapeHtml(displayImageUrl) + '" alt="住宅画像">';
  }

  return html;
}
    // 後でマウスアウト時に元の色へ戻すための変数
    let housesLayer;

    // ==============================
    // houses.geojsonを読み込む
    // ==============================
    fetch('./houses.geojson')
      .then(response => {
        if (!response.ok) {
          throw new Error('GeoJSONを読み込めませんでした');
        }
        return response.json();
      })
      .then(data => {

        // ==============================
        // GeoJSONを地図へ追加
        // ==============================
        housesLayer = L.geoJSON(data, {

          // 建物ポリゴンの色設定
          style: function(feature) {
            const properties = feature.properties || {};
            const status = properties[STATUS_FIELD];
            const color = getColor(status);

            return {
              color: color,
              fillColor: color,
              weight: 2,
              fillOpacity: 0.65
            };
          },

          // 建物ごとのクリック・マウス操作
          onEachFeature: function(feature, layer) {
            const properties = feature.properties || {};

            // ポップアップ
            layer.bindPopup(createPopupContent(properties), {
              maxWidth: 300
            });

            // マウスを乗せた時に少し強調
            layer.on('mouseover', function(e) {
              e.target.setStyle({
                weight: 4,
                fillOpacity: 0.85
              });

              e.target.bringToFront();
            });

            // マウスを外した時に元に戻す
            layer.on('mouseout', function(e) {
              housesLayer.resetStyle(e.target);
            });
          }

        }).addTo(map);

        // 全体が見えるように自動調整
        map.fitBounds(housesLayer.getBounds());
      })
      .catch(error => {
        document.body.innerHTML =
          '<p style="padding:20px;color:red;">エラー: ' +
          error.message +
          '</p>';

        console.error(error);
      });

    // ==============================
    // 凡例を右上に表示
    // ==============================
    const legend = L.control({ position: 'topright' });

    legend.onAdd = function(map) {
      const div = L.DomUtil.create('div', 'legend');

      div.innerHTML += '<div class="legend-title">状態</div>';

      const items = [
        ['現在居住', '#FFD700'],
        ['完全空き家', '#FFFF00'],
        ['空き家で施設入居及び年に数回居住', '#ADFF2F'],
        ['倉庫', '#00FF00'],
        ['飲食店', '#FF00FF'],
        ['商店', '#A020F0'],
        ['加工場', '#00FFFF'],
        ['行政関係', '#4169E1'],
        ['現在居住(別荘)', '#D2B48C'],
        ['神社・お寺', '#9370DB'],
        ['撤去済み', '#FFFFFF'],
        ['管理不完全空き家', '#808080'],
        ['特定空き家', '#000000'],
        ['不明', '#DDDDDD']
      ];

      items.forEach(function(item) {
        div.innerHTML +=
          '<div>' +
          '<span class="legend-color" style="background:' + item[1] + '"></span>' +
          item[0] +
          '</div>';
      });

      return div;
    };

    legend.addTo(map);
  </script>
</body>
</html>
